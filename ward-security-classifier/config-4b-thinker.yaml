model:
  name: "Qwen/Qwen3.5-4B"
  torch_dtype: "bfloat16"
  attn_implementation: "eager"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./output/qwen3.5-4b-thinker"
  num_train_epochs: 3
  per_device_train_batch_size: 1     # larger sequences need more memory
  gradient_accumulation_steps: 16    # compensate for smaller batch
  learning_rate: 2.0e-4
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  save_strategy: "epoch"
  eval_strategy: "epoch"
  load_best_model_at_end: true
  logging_steps: 10
  bf16: true
  tf32: true
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"
  dataloader_num_workers: 0
  report_to: "none"

data:
  train_file: "./data/train_thinker.jsonl"    # includes reasoning chains
  eval_file: "./data/eval.jsonl"
  max_seq_length: 768                          # room for thinking chains
  mode: "thinker"                              # enable_thinking=True training
